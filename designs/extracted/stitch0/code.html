<div class="absolute inset-0 w-full h-full bg-transparent -z-10" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_5" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_5');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const scene = new THREE.Scene();
const containerWidth = container.clientWidth || window.innerWidth;
const containerHeight = container.clientHeight || window.innerHeight;

const camera = new THREE.PerspectiveCamera(75, containerWidth / containerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(containerWidth, containerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Create a custom geometric object - an abstract "sketch" in 3D
// Combining a Wireframe Sphere with a solid core
const group = new THREE.Group();

const geometry = new THREE.IcosahedronGeometry(2, 1);
const wireframeMaterial = new THREE.MeshPhongMaterial({
    color: 0x1a1a1a,
    wireframe: true,
    transparent: true,
    opacity: 0.3
});
const wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
group.add(wireframeMesh);

const coreGeometry = new THREE.IcosahedronGeometry(0.8, 0);
const coreMaterial = new THREE.MeshPhongMaterial({
    color: 0x1a1a1a,
    shininess: 100,
    transparent: true,
    opacity: 0.8
});
const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
group.add(coreMesh);

// Add some smaller floating particles/dots
for (let i = 0; i < 20; i++) {
    const dotGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 6
    );
    group.add(dot);
}

scene.add(group);

let mouseX = 0;
let mouseY = 0;

window.addEventListener('mousemove', (event) => {
    mouseX = (event.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
});

window.addEventListener('resize', () => {
    const newWidth = container.clientWidth || window.innerWidth;
    const newHeight = container.clientHeight || window.innerHeight;
    camera.aspect = newWidth / newHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(newWidth, newHeight);
});

function animate() {
    requestAnimationFrame(animate);

    // Subtle floating rotation
    group.rotation.y += 0.005;
    group.rotation.x += 0.003;

    // React to mouse
    group.rotation.y += mouseX * 0.05;
    group.rotation.x += -mouseY * 0.05;

    // Floating effect
    group.position.y = Math.sin(Date.now() * 0.001) * 0.2;

    renderer.render(scene, camera);
}

animate();

})();
</script>

<script>
        // Simple interactive script to make the sketch subtly follow mouse on desktop
        document.addEventListener('mousemove', (e) => {
            const sketch = document.querySelector('.abstract-sketch');
            if (sketch && window.innerWidth > 768) {
                const x = (e.clientX / window.innerWidth - 0.5) * 20;
                const y = (e.clientY / window.innerHeight - 0.5) * 20;
                sketch.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            }
        });
    </script>
