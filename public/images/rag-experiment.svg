<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 210" width="100%" height="100%">
  <!-- Query Vector -->
  <line x1="60" y1="60" x2="150" y2="120" stroke="#B5502D" stroke-width="2.5" />
  <circle cx="60" cy="60" r="4" fill="#B5502D" />
  <text x="60" y="45" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#B5502D">USER QUERY</text>

  <!-- Vector Database nodes -->
  <g transform="translate(190, 60)">
    <!-- Node 1 -->
    <rect x="0" y="0" width="100" height="25" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
    <text x="50" y="16" font-family="monospace" font-size="9" text-anchor="middle" fill="#1b1c1c">Vector Index</text>
    <!-- Node 2 -->
    <rect x="15" y="40" width="100" height="25" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
    <text x="65" y="56" font-family="monospace" font-size="9" text-anchor="middle" fill="#1b1c1c">Graph Nodes</text>
    <!-- Connecting line -->
    <path d="M 50 25 L 50 35 L 65 35 L 65 40" fill="none" stroke="#747878" stroke-width="1" />
  </g>

  <!-- Verified hook checkmark -->
  <path d="M 140 120 L 148 128 L 165 110" fill="none" stroke="#B5502D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>
