<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 210" width="100%" height="100%">
  <!-- Warm beige background grid -->
  <line x1="20" y1="20" x2="380" y2="20" stroke="#efeded" stroke-width="1" />
  <line x1="20" y1="60" x2="380" y2="60" stroke="#efeded" stroke-width="1" />
  <line x1="20" y1="100" x2="380" y2="100" stroke="#efeded" stroke-width="1" />
  <line x1="20" y1="140" x2="380" y2="140" stroke="#efeded" stroke-width="1" />
  
  <!-- Axis -->
  <path d="M 60 40 L 60 170 L 340 170" fill="none" stroke="#1b1c1c" stroke-width="2" stroke-linecap="round" />
  <!-- Rough grid ticks -->
  <line x1="55" y1="70" x2="65" y2="70" stroke="#1b1c1c" stroke-width="1.5" />
  <line x1="55" y1="120" x2="65" y2="120" stroke="#1b1c1c" stroke-width="1.5" />

  <!-- Bar 1 (Opus 4.8) -->
  <rect x="90" y="100" width="40" height="70" fill="none" stroke="#1b1c1c" stroke-width="2" />
  <line x1="95" y1="110" x2="125" y2="160" stroke="#747878" stroke-width="1" />
  <line x1="95" y1="130" x2="125" y2="165" stroke="#747878" stroke-width="1" />
  
  <!-- Bar 2 (GPT-5.5) -->
  <rect x="170" y="80" width="40" height="90" fill="none" stroke="#1b1c1c" stroke-width="2" />
  <line x1="175" y1="90" x2="205" y2="150" stroke="#747878" stroke-width="1" />
  <line x1="175" y1="110" x2="205" y2="160" stroke="#747878" stroke-width="1" />

  <!-- Bar 3 (Kimi K3 - Tallest & Terracotta) -->
  <rect x="250" y="50" width="40" height="120" fill="none" stroke="#B5502D" stroke-width="2" />
  <line x1="255" y1="60" x2="285" y2="130" stroke="#B5502D" stroke-width="1" />
  <line x1="255" y1="80" x2="285" y2="150" stroke="#B5502D" stroke-width="1" />
  <line x1="255" y1="100" x2="285" y2="160" stroke="#B5502D" stroke-width="1" />

  <!-- Sketched Crown on Kimi bar -->
  <path d="M 255 42 L 262 30 L 270 38 L 278 30 L 285 42 Z" fill="none" stroke="#B5502D" stroke-width="1.5" stroke-linejoin="round" />
</svg>
