<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#F5F5DC" />

  <!-- Background grid lines -->
  <line x1="20" y1="30" x2="380" y2="30" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="125" x2="380" y2="125" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="220" x2="380" y2="220" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="100" y1="10" x2="100" y2="240" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="300" y1="10" x2="300" y2="240" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />

  <!-- Node 1: Supervisor (Top Center) -->
  <circle cx="200" cy="55" r="22" fill="none" stroke="#1b1c1c" stroke-width="1.8" stroke-dasharray="1 0.5" />
  <circle cx="200" cy="55" r="18" fill="none" stroke="#1b1c1c" stroke-width="1.2" />
  <text x="182" y="58" font-family="Courier, monospace" font-size="9" fill="#1b1c1c" font-weight="bold">SUPER</text>

  <!-- Node 2: Writer Agent (Bottom Left) -->
  <circle cx="95" cy="165" r="20" fill="none" stroke="#1b1c1c" stroke-width="1.8" />
  <text x="77" y="168" font-family="Courier, monospace" font-size="9" fill="#1b1c1c" font-weight="bold">WRITER</text>

  <!-- Node 3: Coder Agent (Bottom Right) -->
  <circle cx="305" cy="165" r="20" fill="none" stroke="#1b1c1c" stroke-width="1.8" />
  <text x="290" y="168" font-family="Courier, monospace" font-size="9" fill="#1b1c1c" font-weight="bold">CODER</text>

  <!-- Edges between Supervisor and Writer -->
  <path d="M 180,68 L 115,147" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 124,147 L 114,148 L 119,139" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-linecap="round" />

  <path d="M 108,150 Q 140,95 183,72" fill="none" stroke="#B5502D" stroke-width="1.2" stroke-dasharray="3 2" stroke-linecap="round" />
  <path d="M 174,72 L 184,72 L 180,81" fill="none" stroke="#B5502D" stroke-width="1.2" stroke-linecap="round" />

  <!-- Edges between Supervisor and Coder -->
  <path d="M 220,68 L 285,147" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 281,139 L 286,148 L 276,147" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-linecap="round" />

  <!-- Central Memory / State Store Box -->
  <path d="M 160,115 L 240,115 L 240,155 L 160,155 Z" fill="#F5F5DC" stroke="#1b1c1c" stroke-width="1.5" stroke-linejoin="round" />
  <path d="M 165,127 L 235,127 M 165,137 L 210,137 M 165,147 L 225,147" stroke="#B5502D" stroke-width="1.2" stroke-linecap="round" />
  <circle cx="225" cy="140" r="3.5" fill="#1b1c1c" />
  
  <text x="178" y="110" font-family="Courier, monospace" font-size="9" fill="#1b1c1c" font-weight="bold">STATE</text>

  <!-- Loops and state updates -->
  <path d="M 95,185 Q 200,230 305,185" fill="none" stroke="#1b1c1c" stroke-width="1" stroke-dasharray="4 3" stroke-linecap="round" />
  <text x="175" y="215" font-family="Courier, monospace" font-size="8" fill="#747878">REDUCE_STATE</text>
</svg>
