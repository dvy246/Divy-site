<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#F5F5DC" />

  <!-- Background grid lines -->
  <line x1="20" y1="30" x2="380" y2="30" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="125" x2="380" y2="125" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="220" x2="380" y2="220" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="100" y1="10" x2="100" y2="240" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="300" y1="10" x2="300" y2="240" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />

  <!-- Host/Agent (Left) -->
  <rect x="50" y="65" width="80" height="70" rx="4" fill="none" stroke="#1b1c1c" stroke-width="1.8" stroke-linecap="round" />
  <circle cx="80" cy="95" r="4.5" fill="#1b1c1c" />
  <circle cx="100" cy="95" r="4.5" fill="#1b1c1c" />
  <path d="M 75,115 C 80,122 100,122 105,115" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-linecap="round" />
  <text x="68" y="152" font-family="Courier, monospace" font-size="10" fill="#1b1c1c" font-weight="bold">AI_AGENT</text>

  <!-- Connector Protocol Adapter (Middle) -->
  <!-- Left connector teeth -->
  <path d="M 150,90 L 165,90 L 165,110 L 150,110 Z" fill="none" stroke="#B5502D" stroke-width="1.5" />
  <!-- Line connecting to middle adapter box -->
  <line x1="165" y1="100" x2="195" y2="100" stroke="#B5502D" stroke-width="1.8" />
  <!-- Middle adapter box -->
  <rect x="195" y="85" width="22" height="30" fill="none" stroke="#1b1c1c" stroke-width="1.8" />
  <text x="202" y="103" font-family="Courier, monospace" font-size="9" fill="#B5502D" font-weight="bold">M</text>
  <!-- Right connector line & teeth -->
  <line x1="217" y1="100" x2="247" y2="100" stroke="#B5502D" stroke-width="1.8" />
  <path d="M 247,90 L 262,90 L 262,110 L 247,110 Z" fill="none" stroke="#B5502D" stroke-width="1.5" />

  <!-- Tools / Context Resources (Right) -->
  <!-- Tool 1: DB -->
  <path d="M 285,60 C 285,55 315,55 315,60 L 315,75 C 315,80 285,80 285,75 Z" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
  <!-- Tool 2: Web API -->
  <rect x="285" y="88" width="30" height="20" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-linecap="round" />
  <line x1="290" y1="98" x2="310" y2="98" stroke="#1b1c1c" stroke-width="1" />
  <!-- Tool 3: Filesystem -->
  <path d="M 285,118 L 305,118 L 310,123 L 315,123 L 315,138 L 285,138 Z" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-linejoin="round" />

  <text x="282" y="155" font-family="Courier, monospace" font-size="10" fill="#1b1c1c" font-weight="bold">TOOLS</text>

  <!-- Labels -->
  <text x="175" y="50" font-family="Courier, monospace" font-size="11" fill="#B5502D" font-weight="bold">MCP_LAYER</text>
  <path d="M 138,100 L 148,100" stroke="#1b1c1c" stroke-width="1.5" />
  <path d="M 263,100 L 273,100" stroke="#1b1c1c" stroke-width="1.5" />
</svg>
