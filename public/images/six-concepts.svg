  <line x1="104" y1="77" x2="114" y2="68" stroke="#747878" stroke-width="1" />

  <!-- Cell 2: Prompt -->
  <path d="M 200 45 L 240 45 L 240 75 L 220 75 L 210 85 L 210 75 L 200 75 Z" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
