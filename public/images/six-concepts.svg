  <line x1="70" y1="105" x2="330" y2="105" stroke="#efeded" stroke-width="2" />

  <!-- Cell 1: Neural node -->
  <circle cx="120" cy="62" r="8" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
  <circle cx="100" cy="45" r="5" fill="none" stroke="#1b1c1c" stroke-width="1" />
  <circle cx="100" cy="80" r="5" fill="none" stroke="#1b1c1c" stroke-width="1" />
