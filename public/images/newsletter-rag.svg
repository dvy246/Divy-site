<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#F5F5DC" />

  <!-- Background grid lines -->
  <line x1="20" y1="30" x2="380" y2="30" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="125" x2="380" y2="125" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="220" x2="380" y2="220" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="150" y1="10" x2="150" y2="240" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />

  <!-- Splitting documents (Left) -->
  <path d="M 50,70 L 90,70 L 90,110 L 50,110 Z" fill="none" stroke="#1b1c1c" stroke-width="1.8" />
  <line x1="50" y1="90" x2="90" y2="90" stroke="#B5502D" stroke-width="1.5" stroke-dasharray="2 2" />
  <!-- Scissors icon sketchy -->
  <path d="M 100,80 C 103,75 110,75 110,80 C 110,83 105,85 102,88 L 115,100" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
  <path d="M 100,95 C 103,100 110,100 110,95 C 110,92 105,90 102,88 L 115,75" fill="none" stroke="#1b1c1c" stroke-width="1.5" />

  <!-- Vectors Database indexing (Right) -->
  <ellipse cx="280" cy="80" rx="30" ry="10" fill="none" stroke="#1b1c1c" stroke-width="1.8" />
  <path d="M 250,80 L 250,140 C 250,150 310,150 310,140 L 310,80" fill="none" stroke="#1b1c1c" stroke-width="1.8" stroke-linecap="round" />
  <path d="M 250,110 C 250,120 310,120 310,110" fill="none" stroke="#1b1c1c" stroke-width="1.2" />
  
  <circle cx="280" cy="110" r="3" fill="#B5502D" />
  <circle cx="265" cy="125" r="3.5" fill="#1b1c1c" />
  <circle cx="295" cy="130" r="2.5" fill="#B5502D" />

  <!-- Ingestion Arrow -->
  <path d="M 130,95 L 230,95" fill="none" stroke="#1b1c1c" stroke-width="1.8" stroke-linecap="round" />
  <path d="M 220,89 L 231,95 L 220,101" fill="none" stroke="#1b1c1c" stroke-width="1.8" stroke-linecap="round" />
  <text x="155" y="85" font-family="Courier, monospace" font-size="9" fill="#1b1c1c" font-weight="bold">CHUNK_EMBED</text>

  <!-- Labels -->
  <text x="50" y="145" font-family="Courier, monospace" font-size="10" fill="#1b1c1c" font-weight="bold">SPLIT</text>
  <text x="262" y="172" font-family="Courier, monospace" font-size="10" fill="#1b1c1c" font-weight="bold">INDEX</text>
</svg>
