<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#F5F5DC" />

  <!-- Background grid lines -->
  <line x1="20" y1="30" x2="380" y2="30" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="125" x2="380" y2="125" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="20" y1="220" x2="380" y2="220" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <line x1="200" y1="10" x2="200" y2="240" stroke="#1b1c1c" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />

  <!-- Classic Balance Scale (Center) -->
  <!-- Scale Stand -->
  <line x1="200" y1="60" x2="200" y2="180" stroke="#1b1c1c" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 175,180 L 225,180 L 210,185 L 190,185 Z" fill="none" stroke="#1b1c1c" stroke-width="2" />
  <circle cx="200" cy="55" r="5" fill="#1b1c1c" />

  <!-- Scale Beam (tilted slightly to the left) -->
  <path d="M 120,70 L 280,60" fill="none" stroke="#1b1c1c" stroke-width="3" stroke-linecap="round" />
  
  <!-- Left Pan (Weighted Down - Quality/Hallucination) -->
  <line x1="120" y1="70" x2="100" y2="115" stroke="#1b1c1c" stroke-width="1.2" />
  <line x1="120" y1="70" x2="140" y2="115" stroke="#1b1c1c" stroke-width="1.2" />
  <path d="M 90,115 C 90,128 150,128 150,115 Z" fill="none" stroke="#1b1c1c" stroke-width="1.8" />
  <!-- Weight blocks on Left -->
  <rect x="105" y="102" width="18" height="12" fill="none" stroke="#B5502D" stroke-width="1.5" />
  <rect x="125" y="105" width="12" height="9" fill="none" stroke="#1b1c1c" stroke-width="1" />
  <text x="75" y="145" font-family="Courier, monospace" font-size="8.5" fill="#B5502D" font-weight="bold">ACCURACY</text>

  <!-- Right Pan (Higher Up - Latency/Cost) -->
  <line x1="280" y1="60" x2="260" y2="105" stroke="#1b1c1c" stroke-width="1.2" />
  <line x1="280" y1="60" x2="300" y2="105" stroke="#1b1c1c" stroke-width="1.2" />
  <path d="M 250,105 C 250,118 310,118 310,105 Z" fill="none" stroke="#1b1c1c" stroke-width="1.8" />
  <!-- Weight block on Right -->
  <rect x="272" y="96" width="15" height="9" fill="none" stroke="#1b1c1c" stroke-width="1.2" />
  <text x="272" y="135" font-family="Courier, monospace" font-size="8.5" fill="#747878">LATENCY</text>

  <!-- Gauge/Dashboard metrics underneath -->
  <circle cx="200" cy="120" r="16" fill="none" stroke="#1b1c1c" stroke-width="1.5" stroke-dasharray="30 20" />
  <line x1="200" y1="120" x2="210" y2="112" stroke="#B5502D" stroke-width="2" stroke-linecap="round" />
  
  <text x="145" y="215" font-family="Courier, monospace" font-size="10" fill="#1b1c1c" font-weight="bold">PRODUCTION_EVAL</text>
</svg>
