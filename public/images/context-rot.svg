<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 210" width="100%" height="100%">
  <!-- Horizontal guides -->
  <line x1="30" y1="50" x2="370" y2="50" stroke="#efeded" stroke-width="1" />
  <line x1="30" y1="160" x2="370" y2="160" stroke="#efeded" stroke-width="1" />

  <!-- Crystalline Memory stack (Left) -->
  <g transform="translate(80, 40)">
    <ellipse cx="50" cy="20" rx="40" ry="10" fill="none" stroke="#1b1c1c" stroke-width="2" />
    <path d="M 10 20 L 10 50 A 40 10 0 0 0 90 50 L 90 20" fill="none" stroke="#1b1c1c" stroke-width="2" />
    <path d="M 10 50 L 10 80 A 40 10 0 0 0 90 80 L 90 50" fill="none" stroke="#1b1c1c" stroke-width="2" />
    <path d="M 10 80 L 10 110 A 40 10 0 0 0 90 110 L 90 80" fill="none" stroke="#1b1c1c" stroke-width="2" />
  </g>

  <!-- Flow arrows decay -->
  <path d="M 180 105 L 240 105" fill="none" stroke="#B5502D" stroke-width="2" stroke-dasharray="3 3" />
  <path d="M 235 98 L 245 105 L 235 112" fill="none" stroke="#B5502D" stroke-width="2" />

  <!-- Rotting/Decaying Stack (Right) -->
  <g transform="translate(240, 40)">
    <ellipse cx="50" cy="20" rx="40" ry="10" fill="none" stroke="#B5502D" stroke-width="1.5" stroke-dasharray="2 2" />
    <path d="M 10 20 L 10 35 M 90 20 L 90 35" fill="none" stroke="#B5502D" stroke-width="1.5" />
    <!-- Distorted lower stack representing decay -->
    <path d="M 12 50 Q 50 65 88 48" fill="none" stroke="#B5502D" stroke-width="2" />
    <path d="M 15 80 Q 48 95 75 75" fill="none" stroke="#B5502D" stroke-width="1" />
  </g>
</svg>
