<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 210" width="100%" height="100%">
  <!-- Central wiki-nodes -->
  <g transform="translate(60, 40)">
    <rect x="0" y="20" width="80" height="30" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
    <text x="40" y="40" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#1b1c1c">WIKI_DATA</text>

    <rect x="20" y="70" width="80" height="30" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
    <text x="60" y="90" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#1b1c1c">WEB_CONTEXT</text>

    <!-- Connectors -->
    <path d="M 80 35 Q 120 35 120 70 M 100 85 Q 120 85 150 85" fill="none" stroke="#747878" stroke-width="1" />
  </g>

  <!-- Memory flow -->
  <path d="M 180 105 L 225 105" stroke="#B5502D" stroke-width="2" stroke-dasharray="2 2" />
  <path d="M 218 98 L 226 105 L 218 112" fill="none" stroke="#B5502D" stroke-width="2" />

  <!-- Neural Brain Nodes (Right) -->
  <g transform="translate(230, 40)">
    <!-- Crystalline nodes -->
    <circle cx="50" cy="30" r="6" fill="#B5502D" />
    <circle cx="20" cy="70" r="5" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
    <circle cx="80" cy="70" r="5" fill="none" stroke="#1b1c1c" stroke-width="1.5" />
    <circle cx="50" cy="110" r="6" fill="#B5502D" />

    <!-- Connective lines -->
    <line x1="47" y1="36" x2="23" y2="65" stroke="#1b1c1c" stroke-width="1.5" />
    <line x1="53" y1="36" x2="77" y2="65" stroke="#1b1c1c" stroke-width="1.5" />
    <line x1="23" y1="75" x2="47" y2="104" stroke="#1b1c1c" stroke-width="1.5" />
    <line x1="77" y1="75" x2="53" y2="104" stroke="#1b1c1c" stroke-width="1.5" />
  </g>
</svg>
