<svg
  viewBox="0 0 300 300"
  xmlns="http://www.w3.org/2000/svg"
  width="300"
  height="300"
  fill="none"
>
  <!-- Outer torus-knot approximation: overlapping loops hand-drawn style -->
  <!-- Main outer loop -->
  <path
    d="M150,40 C200,40 240,80 240,130 C240,160 220,185 195,195 C210,210 220,230 215,250 C205,275 175,285 150,285 C125,285 95,275 85,250 C80,230 90,210 105,195 C80,185 60,160 60,130 C60,80 100,40 150,40 Z"
    stroke="#1b1c1c"
    stroke-width="1.5"
    fill="none"
    stroke-dasharray="6 3"
  />
  <!-- Inner figure-8 loop -->
  <path
    d="M150,80 C175,80 195,100 195,125 C195,150 175,165 155,165 C175,175 190,195 185,218 C178,238 165,248 150,248 C135,248 122,238 115,218 C110,195 125,175 145,165 C125,165 105,150 105,125 C105,100 125,80 150,80 Z"
    stroke="#1b1c1c"
    stroke-width="1.5"
    fill="none"
  />
  <!-- Crossing thread - horizontal -->
  <path
    d="M80,140 C100,125 120,130 150,135 C180,140 200,130 220,140"
    stroke="#1b1c1c"
    stroke-width="1.2"
    fill="none"
    stroke-linecap="round"
  />
  <!-- Crossing thread - diagonal -->
  <path
    d="M100,95 C120,110 135,125 145,145 C155,165 165,185 175,205"
    stroke="#1b1c1c"
    stroke-width="1.2"
    fill="none"
    stroke-linecap="round"
  />
  <!-- Crossing thread - diagonal 2 -->
  <path
    d="M200,95 C180,110 165,125 155,145 C145,165 135,185 125,205"
    stroke="#1b1c1c"
    stroke-width="1.2"
    fill="none"
    stroke-linecap="round"
  />
  <!-- Accent dot at center -->
  <circle cx="150" cy="150" r="4" fill="#B5502D" />
  <!-- Small accent rings -->
  <circle cx="150" cy="150" r="12" stroke="#B5502D" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.5"/>
  <!-- Corner accent marks (hand-drawn style) -->
  <path d="M50,50 L65,50 L50,65" stroke="#1b1c1c" stroke-width="1" fill="none" opacity="0.3" />
  <path d="M250,50 L235,50 L250,65" stroke="#1b1c1c" stroke-width="1" fill="none" opacity="0.3" />
  <path d="M50,250 L65,250 L50,235" stroke="#1b1c1c" stroke-width="1" fill="none" opacity="0.3" />
  <path d="M250,250 L235,250 L250,235" stroke="#1b1c1c" stroke-width="1" fill="none" opacity="0.3" />
</svg>
